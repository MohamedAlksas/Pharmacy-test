name: Flutter CI/CD

on:
  push:
    branches: [ main ]

jobs:

  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
        continue-on-error: true
      - run: flutter test
        continue-on-error: true

  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    needs: analyze
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release

      - name: Zip the build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pharmacy-wms-windows.zip

      - name: Read and bump version
        id: version
        shell: powershell
        run: |
          $json = Get-Content version.json -Raw | ConvertFrom-Json

          $parts = $json.latestVersion -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2] + 1
          $nextVer = "$major.$minor.$patch"
          $nextBuild = $json.latestBuildNumber + 1

          echo "current=$($json.latestVersion)" >> $env:GITHUB_OUTPUT
          echo "currentBuild=$($json.latestBuildNumber)" >> $env:GITHUB_OUTPUT
          echo "next=$nextVer" >> $env:GITHUB_OUTPUT
          echo "nextBuild=$nextBuild" >> $env:GITHUB_OUTPUT

          echo "Current: v$($json.latestVersion) (build $($json.latestBuildNumber))"
          echo "Next:    v$nextVer (build $nextBuild)"

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          files: pharmacy-wms-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version files for next release
        shell: powershell
        run: |
          $nextVer = "${{ steps.version.outputs.next }}"
          $nextBuild = ${{ steps.version.outputs.nextBuild }}

          # Update version.json
          $json = Get-Content version.json -Raw | ConvertFrom-Json
          $json.latestVersion = $nextVer
          $json.latestBuildNumber = $nextBuild
          $json | ConvertTo-Json -Depth 5 | Set-Content version.json

          # Update pubspec.yaml — bump version: X.Y.Z+B
          $pubspec = Get-Content pubspec.yaml -Raw
          $pubspec = $pubspec -replace '^version: .+', "version: $nextVer+$nextBuild"
          Set-Content pubspec.yaml $pubspec

          echo "Bumped to $nextVer (build $nextBuild)"

      - name: Commit version bump [skip ci]
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push
