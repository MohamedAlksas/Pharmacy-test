name: Flutter CI/CD

on:
  push:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Analyze & Test (Linux - fast)
  # ─────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 2: Build Windows EXE + GitHub Release
  # ─────────────────────────────────────────
  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    needs: analyze
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      version: ${{ steps.read-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Zip the build output
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pharmacy-wms-windows.zip

      - name: Read version from version.json
        id: read-version
        shell: powershell
        run: |
          $json = Get-Content version.json -Raw | ConvertFrom-Json
          $ver = $json.latestVersion
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Detected version: $ver"

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.read-version.outputs.version }}
          name: v${{ steps.read-version.outputs.version }}
          files: pharmacy-wms-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}